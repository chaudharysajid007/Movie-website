<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sajidflix | Watch & Download</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; }
    </style>
</head>
<body class="relative min-h-screen">

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-[100] hidden transition-opacity duration-300 opacity-0" onclick="toggleSidebar()"></div>
    
    <nav id="sidebar-menu" class="fixed top-0 left-0 bottom-0 w-64 bg-[#111827] border-r border-gray-800 z-[101] transform -translate-x-full transition-transform duration-300 ease-in-out p-6 flex flex-col justify-between">
        <div>
            <div class="flex justify-between items-center mb-8 pb-4 border-b border-gray-800">
                <span class="text-emerald-400 font-black tracking-wider text-xl pl-2">Sajidflix</span>
                <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white text-xl cursor-pointer">✕</button>
            </div>
            
            <div class="space-y-4">
                <a href="#" onclick="window.location.reload()" class="block text-gray-300 hover:text-emerald-400 font-semibold p-2 rounded hover:bg-gray-800/50 transition-colors">🏠 Home</a>
                <a href="#" onclick="filterByType('movie')" class="block text-gray-300 hover:text-emerald-400 font-semibold p-2 rounded hover:bg-gray-800/50 transition-colors">🎬 Movies</a>
                <a href="#" onclick="filterByType('series')" class="block text-gray-300 hover:text-emerald-400 font-semibold p-2 rounded hover:bg-gray-800/50 transition-colors">📺 Series & Anime</a>
                <a href="https://forms.gle/MysvZiQ4YQRERT6M7" target="_blank" class="block text-gray-300 hover:text-emerald-400 font-semibold p-2 rounded hover:bg-gray-800/50 transition-colors">📨 Request Content</a>
                <a href="admin.html" class="block text-gray-300 hover:text-emerald-400 font-semibold p-2 rounded hover:bg-gray-800/50 transition-colors">🔒 Admin Dashboard</a>
            </div>
        </div>
        
        <div class="text-xs text-gray-500 border-t border-gray-800 pt-4">
            © 2026 Sajidflix 
        </div>
    </nav>

    <header class="border-b border-gray-800 bg-[#111827] sticky top-0 z-50 px-4 py-3 shadow-lg">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3">
            <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-start">
                <button onclick="toggleSidebar()" class="text-2xl text-gray-300 hover:text-emerald-400 cursor-pointer focus:outline-none" title="Open Menu">
                    ☰
                </button>
                <h1 class="text-2xl font-black tracking-wider text-emerald-400 cursor-pointer" onclick="window.location.reload()">SAJID<span class="text-white">FLIX</span></h1>
                <div class="sm:hidden"></div> 
            </div>
            
            <div class="relative w-full sm:w-72">
                <input id="search-bar" type="text" placeholder="Search movies, anime, series..." 
                       class="w-full bg-[#1f2937] text-white pl-4 pr-10 py-2 rounded-lg border border-gray-700 focus:outline-none focus:border-emerald-400 text-sm">
                <button class="absolute right-3 top-2.5 text-gray-400">🔍</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <h2 id="section-title" class="text-xl font-bold border-l-4 border-emerald-500 pl-3 mb-6 tracking-wide">LATEST UPLOADS</h2>
        
        <div id="loading" class="flex justify-center my-12">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-emerald-400"></div>
        </div>

        <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6"></div>
    </main>

    <script>
        const API_BASE_URL = "https://guarded-caverns-13017-b15ead89228a.herokuapp.com/api/content";
        const movieGrid = document.getElementById('movie-grid');
        const loadingSpinner = document.getElementById('loading');
        const searchBar = document.getElementById('search-bar');
        const sectionTitle = document.getElementById('section-title');
        const sidebarMenu = document.getElementById('sidebar-menu');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        
        let searchTimer;

        // 🍔 SIDEBAR INTERACTION LOGIC
        function toggleSidebar() {
            const isHidden = sidebarMenu.classList.contains('-translate-x-full');
            if (isHidden) {
                sidebarMenu.classList.remove('-translate-x-full');
                sidebarOverlay.classList.remove('hidden');
                setTimeout(() => sidebarOverlay.classList.add('opacity-100'), 10);
            } else {
                sidebarMenu.classList.add('-translate-x-full');
                sidebarOverlay.classList.remove('opacity-100');
                setTimeout(() => sidebarOverlay.classList.add('hidden'), 300);
            }
        }

        // Centralized Catalog Rendering Method
        function renderGrid(items) {
            movieGrid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-[#111827] border border-gray-800 rounded-lg overflow-hidden group shadow-md hover:border-emerald-500 transition-all duration-300 cursor-pointer";
                
                // 🌟 PASSING BOTH ID AND TYPE TO DETAILS VIEW 
                card.onclick = () => window.location.href = `movie.html?id=${item._id}&type=${item.type}`;

                card.innerHTML = `
                    <div class="relative overflow-hidden aspect-[2/3]">
                        <img src="${item.coverImageUrl}" alt="${item.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" loading="lazy">
                        <span class="absolute top-2 left-2 bg-emerald-500 text-black text-[10px] font-bold uppercase px-2 py-0.5 rounded shadow">
                            ${item.type}
                        </span>
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-sm line-clamp-2 group-hover:text-emerald-400 transition-colors">${item.title}</h3>
                    </div>
                `;
                movieGrid.appendChild(card);
            });
        }

        // Fetch Landing Page Catalog (Active Uploaded Stored Items)
        async function fetchCatalog(url = API_BASE_URL) {
            try {
                loadingSpinner.style.display = 'flex';
                movieGrid.innerHTML = '';
                
                const response = await fetch(url);
                const items = await response.json();
                
                loadingSpinner.style.display = 'none';

                if(items.length === 0) {
                    movieGrid.innerHTML = `<p class="col-span-full text-center text-gray-400 my-8">No links uploaded yet.</p>`;
                    return;
                }

                renderGrid(items);
            } catch (err) {
                loadingSpinner.style.display = 'none';
                console.error("UI Render error:", err);
            }
        }

        // Filter display catalogue via Sidebar triggers
        async function filterByType(type) {
            toggleSidebar();
            searchBar.value = "";
            sectionTitle.innerText = type === 'movie' ? "🎬 EXPLORE MOVIES" : "📺 EXPLORE SERIES & ANIME";
            
            try {
                loadingSpinner.style.display = 'flex';
                movieGrid.innerHTML = '';
                
                const response = await fetch(API_BASE_URL);
                const items = await response.json();
                
                loadingSpinner.style.display = 'none';
                const filteredItems = items.filter(item => item.type === type);
                
                if(filteredItems.length === 0) {
                    movieGrid.innerHTML = `<p class="col-span-full text-center text-gray-400 my-8">No items uploaded here yet.</p>`;
                    return;
                }
                renderGrid(filteredItems);
            } catch (err) {
                loadingSpinner.style.display = 'none';
                console.error("Filter evaluation error:", err);
            }
        }

        // Live Real-Time Search Event Listener (Connected to TMDb backend endpoints)
        searchBar.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            clearTimeout(searchTimer);

            searchTimer = setTimeout(() => {
                if(query.length >= 1) {
                    sectionTitle.innerText = `SEARCH RESULTS FOR: "${query.toUpperCase()}"`;
                    fetchCatalog(`${API_BASE_URL}/search?q=${query}`);
                } else if (query.length === 0) {
                    sectionTitle.innerText = "LATEST UPLOADS";
                    fetchCatalog();
                }
            }, 300);
        });

        window.onload = () => fetchCatalog();
    </script>
</body>
</html>
