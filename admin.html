<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | MoviesMod</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; }
        .form-card { background-color: #111827; border: 1px solid #1f2937; }
        input, select, textarea { background-color: #1f2937; border: 1px solid #374151; color: white; padding: 8px; border-radius: 6px; width: 100%; outline: none; }
        input:focus { border-color: #10b981; }
        label { display: block; font-size: 12px; font-weight: bold; color: #9ca3af; margin-bottom: 4px; text-transform: uppercase; }
    </style>
</head>
<body class="p-4 sm:p-8 relative">

    <div id="admin-lockbox" class="fixed inset-0 bg-[#0b0f19] z-[100] flex flex-col items-center justify-center p-4">
        <div class="bg-[#111827] border border-gray-800 p-6 rounded-xl shadow-2xl max-w-sm w-full text-center">
            <h2 class="text-xl font-black text-emerald-400 mb-2">🔒 ADMIN VERIFICATION</h2>
            <p class="text-xs text-gray-400 mb-4">Authorized Personnel Only</p>
            <input type="password" id="admin-secret-key" placeholder="Enter Admin Password" class="mb-4 text-center">
            <button type="button" onclick="verifyAdminKey()" class="w-full bg-emerald-500 text-black font-bold py-2 rounded-lg cursor-pointer">UNLOCK PANEL</button>
        </div>
    </div>

    <div id="admin-content" class="hidden">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-2xl font-black text-emerald-400">ADMIN <span class="text-white">PANEL</span></h1>
                    <span id="mode-badge" class="mt-1 inline-block bg-emerald-950 text-emerald-400 text-[10px] font-bold px-2 py-0.5 rounded border border-emerald-900 uppercase tracking-widest">Adding New Content</span>
                </div>
                <button onclick="window.location.href='index.html'" class="text-sm text-gray-400 hover:text-white cursor-pointer">View Site ↗</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start mb-12">
                <section class="form-card p-6 rounded-xl shadow-2xl lg:col-span-2">
                    <h2 id="form-heading" class="text-xl font-bold mb-6 border-b border-gray-800 pb-3">Upload Links via Internal Database Reference</h2>
                    
                    <form id="admin-form" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label>Database Content ID Reference</label>
                                <input type="text" id="tmdbId" placeholder="e.g. 634649" required oninput="updateLivePreview()">
                            </div>
                            <div>
                                <label>Format Type</label>
                                <select id="type" onchange="toggleFormType(); updateLivePreview();">
                                    <option value="movie">Movie</option>
                                    <option value="series">Series / Anime</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-900/20 p-3 rounded-lg border border-gray-800/40">
                            <div>
                                <label>Content Title (Preview Only)</label>
                                <input type="text" id="preview-title" placeholder="e.g. Spider-Man" oninput="updateLivePreview()">
                            </div>
                            <div>
                                <label>Cover Image URL (Preview Only)</label>
                                <input type="text" id="preview-image" placeholder="https://example.com/image.jpg" oninput="updateLivePreview()">
                            </div>
                        </div>

                        <div id="movie-section" class="bg-gray-900/50 p-4 rounded-lg">
                            <h3 class="font-bold text-sm text-emerald-400 mb-4 uppercase">Movie Download Links</h3>
                            <div id="movie-links-container" class="space-y-3"></div>
                            <button type="button" onclick="addMovieLinkField()" class="mt-3 text-xs bg-emerald-600 px-3 py-1 rounded font-bold text-black cursor-pointer">+ Add Resolution</button>
                        </div>

                        <div id="series-section" class="hidden bg-gray-900/50 p-4 rounded-lg space-y-4">
                            <h3 class="font-bold text-sm text-emerald-400 mb-2 uppercase">Series/Anime Seasons Breakdown</h3>
                            <div id="seasons-container" class="space-y-6"></div>
                            <button type="button" onclick="addSeason()" class="w-full py-2 border-2 border-dashed border-gray-700 rounded-lg text-gray-500 font-bold hover:border-emerald-500 hover:text-emerald-500 cursor-pointer">+ Add Season</button>
                        </div>

                        <div class="flex gap-3 justify-end">
                            <button id="btn-cancel-edit" type="button" onclick="resetFormState()" class="hidden bg-gray-800 hover:bg-gray-700 text-gray-300 font-bold px-5 py-2 rounded-lg text-xs cursor-pointer">Cancel Edit</button>
                            <button type="submit" id="submit-btn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black py-3 rounded-lg transition-colors shadow-lg cursor-pointer">🚀 PUBLISH DOWNLOAD MATRIX</button>
                        </div>
                    </form>
                </section>

                <section class="form-card p-6 rounded-xl sticky top-6">
                    <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4 border-b border-gray-800 pb-2">🖼️ Live Card Preview</h2>
                    <div class="flex justify-center">
                        <div id="preview-card-container" class="w-full max-w-[200px] bg-[#111827] border border-gray-800 rounded-lg overflow-hidden relative shadow-lg">
                            <div class="relative overflow-hidden aspect-[2/3] bg-gray-800 flex items-center justify-center text-center p-2 text-xs text-gray-500">
                                <span id="preview-placeholder-text">Image Preview Area</span>
                                <img id="preview-card-img" class="absolute inset-0 w-full h-full object-cover hidden" src="" alt="">
                                <span id="preview-card-badge" class="absolute top-2 left-2 bg-emerald-500 text-black text-[10px] font-bold uppercase px-2 py-0.5 rounded shadow">Movie</span>
                            </div>
                            <div class="p-3">
                                <h3 id="preview-card-title" class="font-bold text-sm text-gray-400 italic line-clamp-2">Untitled Asset</h3>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <section class="form-card p-6 rounded-xl">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
                    <h2 class="text-xl font-bold">Manage Existing Content</h2>
                    <div class="w-full sm:w-72">
                        <input type="text" id="admin-search-bar" placeholder="🔍 Search ID Key..." class="text-sm py-1.5 px-3" oninput="filterAdminList()">
                    </div>
                </div>
                <div id="admin-list" class="space-y-3"></div>
            </section>
        </div>
    </div>

    <script>
        const API_URL = "https://guarded-caverns-13017-b15ead89228a.herokuapp.com/api/content";
        const form = document.getElementById('admin-form');
        let sessionPasswordMemory = ""; 
        let editingId = null; 
        let globalAdminContentCache = []; // Internal global cache to enable instant localized searching

        async function verifyAdminKey() {
            const inputKey = document.getElementById('admin-secret-key').value;

            try {
                const res = await fetch(`${API_URL}/verify-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: inputKey })
                });

                if (res.ok) {
                    sessionPasswordMemory = inputKey; 
                    document.getElementById('admin-lockbox').remove();
                    document.getElementById('admin-content').classList.remove('hidden');
                    loadAdminList();
                } else {
                    alert("❌ ACCESS DENIED: Invalid Admin Password.");
                    window.location.href = "index.html";
                }
            } catch (err) {
                alert("Server verification failed.");
            }
        }

        function toggleFormType() {
            const type = document.getElementById('type').value;
            document.getElementById('movie-section').classList.toggle('hidden', type !== 'movie');
            document.getElementById('series-section').classList.toggle('hidden', type !== 'series');
        }

        function updateLivePreview() {
            const titleInput = document.getElementById('preview-title').value.trim();
            const imageInput = document.getElementById('preview-image').value.trim();
            const typeInput = document.getElementById('type').value;

            const pTitle = document.getElementById('preview-card-title');
            const pImg = document.getElementById('preview-card-img');
            const pText = document.getElementById('preview-placeholder-text');
            const pBadge = document.getElementById('preview-card-badge');

            pTitle.textContent = titleInput || "Untitled Asset";
            pTitle.classList.toggle('italic', !titleInput);
            pTitle.classList.toggle('text-gray-400', !titleInput);
            pTitle.classList.toggle('text-white', !!titleInput);

            pBadge.textContent = typeInput === 'movie' ? 'Movie' : 'Series';

            if (imageInput) {
                pImg.src = imageInput;
                pImg.classList.remove('hidden');
                pText.classList.add('hidden');
            } else {
                pImg.src = '';
                pImg.classList.add('hidden');
                pText.classList.remove('hidden');
            }
        }

        function addMovieLinkField(resolution = '1080p', downloadUrl = '') {
            const container = document.getElementById('movie-links-container');
            const div = document.createElement('div');
            div.className = "flex gap-2 movie-link-item";
            div.innerHTML = `
                <select class="w-32 res-val">
                    <option value="480p" ${resolution === '480p' ? 'selected' : ''}>480p</option>
                    <option value="720p" ${resolution === '720p' ? 'selected' : ''}>720p</option>
                    <option value="1080p" ${resolution === '1080p' ? 'selected' : ''}>1080p</option>
                </select>
                <input type="text" class="url-val" placeholder="Download URL" value="${downloadUrl}">
            `;
            container.appendChild(div);
        }

        function addSeason(sNum = null) {
            const currentSeasonsCount = document.querySelectorAll('.season-item').length + 1;
            const targetSeasonNumber = sNum !== null ? sNum : currentSeasonsCount;
            
            const container = document.getElementById('seasons-container');
            const sDiv = document.createElement('div');
            sDiv.className = "bg-black/30 p-4 rounded-lg border border-gray-800 season-item";
            sDiv.innerHTML = `
                <div class="flex items-center gap-4 mb-4">
                    <label class="mb-0">Season Number</label>
                    <input type="number" class="w-20 s-num" value="${targetSeasonNumber}">
                </div>
                <div class="res-container space-y-4"></div>
                <button type="button" onclick="addResolution(this)" class="mt-4 text-[10px] bg-blue-600 px-2 py-1 rounded text-white">+ Add Resolution Block</button>
            `;
            container.appendChild(sDiv);
            return sDiv.querySelector('.res-container');
        }

        function addResolution(btn, rVal = '1080p', bLink = '') {
            const container = btn.tagName === 'BUTTON' ? btn.previousElementSibling : btn;
            const rDiv = document.createElement('div');
            rDiv.className = "bg-gray-800/50 p-3 rounded res-item border-l-2 border-emerald-500";
            rDiv.innerHTML = `
                <div class="flex gap-2 mb-2">
                    <select class="w-24 r-val">
                        <option value="480p" ${rVal === '480p' ? 'selected' : ''}>480p</option>
                        <option value="720p" ${rVal === '720p' ? 'selected' : ''}>720p</option>
                        <option value="1080p" ${rVal === '1080p' ? 'selected' : ''}>1080p</option>
                    </select>
                    <input type="text" class="b-link" placeholder="Batch Link (Optional)" value="${bLink}">
                </div>
                <div class="ep-container grid grid-cols-2 gap-2"></div>
                <button type="button" onclick="addEpisode(this)" class="mt-2 text-[10px] text-emerald-400 font-bold uppercase tracking-widest">+ Add Episode</button>
            `;
            container.appendChild(rDiv);
            return rDiv.querySelector('.ep-container');
        }

        function addEpisode(btn, eNum = '', eUrl = '') {
            const container = btn.tagName === 'BUTTON' ? btn.previousElementSibling : btn;
            const eDiv = document.createElement('div');
            eDiv.className = "flex gap-1 ep-item";
            eDiv.innerHTML = `
                <input type="number" class="w-16 e-num" placeholder="Ep #" value="${eNum}">
                <input type="text" class="e-url" placeholder="Ep URL" value="${eUrl}">
            `;
            container.appendChild(eDiv);
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const type = document.getElementById('type').value;
            const tmdbVal = document.getElementById('tmdbId').value.trim();
            
            const payload = {
                id: tmdbVal,
                tmdbId: tmdbVal,
                type: type,
                movieLinks: [],
                seasons: []
            };

            if(type === 'movie') {
                document.querySelectorAll('.movie-link-item').forEach(el => {
                    const downloadUrl = el.querySelector('.url-val').value.trim();
                    if(downloadUrl) {
                        payload.movieLinks.push({ resolution: el.querySelector('.res-val').value, downloadUrl });
                    }
                });
            } else {
                document.querySelectorAll('.season-item').forEach(sEl => {
                    const season = { seasonNumber: sEl.querySelector('.s-num').value, resolutions: [] };
                    sEl.querySelectorAll('.res-item').forEach(rEl => {
                        const res = { resolution: rEl.querySelector('.r-val').value, batchLink: rEl.querySelector('.b-link').value.trim(), episodes: [] };
                        rEl.querySelectorAll('.ep-item').forEach(eEl => {
                            const downloadUrl = eEl.querySelector('.e-url').value.trim();
                            if(downloadUrl) {
                                res.episodes.push({ episodeNumber: eEl.querySelector('.e-num').value, downloadUrl });
                            }
                        });
                        season.resolutions.push(res);
                    });
                    payload.seasons.push(season);
                });
            }

            const targetUrl = editingId ? `${API_URL}/edit/${editingId}` : `${API_URL}/add`;
            const targetMethod = editingId ? 'PUT' : 'POST';

            try {
                const res = await fetch(targetUrl, {
                    method: targetMethod,
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Admin-Password': sessionPasswordMemory
                    },
                    body: JSON.stringify(payload)
                });

                if(res.ok) { 
                    alert(editingId ? '✅ Links Content Map Updated!' : '✅ Download Streams Published Successfully!'); 
                    resetFormState();
                    loadAdminList();
                } else {
                    const errRes = await res.json();
                    alert(`❌ ERROR: ${errRes.message || 'Submission failed.'}`);
                }
            } catch (err) {
                console.error(err);
            }
        };

        async function loadAdminList() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                // Cache the data globally
                globalAdminContentCache = data;
                
                // Run filtering engine (renders full list initially if search bar is blank)
                filterAdminList();
            } catch (err) {
                console.error("Error loading panel lists:", err);
            }
        }

        // Dedicated array-filtering parser handles real-time lookups instantly
        function filterAdminList() {
            const searchKeyword = document.getElementById('admin-search-bar').value.toLowerCase().trim();
            const list = document.getElementById('admin-list');
            list.innerHTML = ""; 

            // Filter cache using matching inputs
            const filteredItems = globalAdminContentCache.filter(item => {
                return item._id.toString().toLowerCase().includes(searchKeyword);
            });

            if(filteredItems.length === 0) {
                list.innerHTML = `<p class="text-xs text-gray-500 italic text-center py-4">No matching database indices discovered.</p>`;
                return;
            }
            
            // XSS-Safe interface rendering
            filteredItems.forEach(item => {
                const rowDiv = document.createElement('div');
                rowDiv.className = "flex justify-between items-center bg-gray-900 p-3 rounded border border-gray-800";

                const textSpan = document.createElement('span');
                textSpan.className = "text-sm font-bold font-mono text-emerald-400";
                textSpan.textContent = `ID Key: ${item._id} `;
                
                const typeLabel = document.createElement('span');
                typeLabel.className = "text-gray-400 font-sans font-normal text-xs";
                typeLabel.textContent = `(${item.type})`;
                textSpan.appendChild(typeLabel);

                const btnGroup = document.createElement('div');
                btnGroup.className = "flex gap-2";

                const editBtn = document.createElement('button');
                editBtn.className = "bg-blue-900/50 text-blue-400 text-xs px-3 py-1 rounded cursor-pointer hover:bg-blue-800/60 transition-colors";
                editBtn.textContent = "Edit Links";
                editBtn.onclick = () => startEdit(item._id, item.type);

                const wipeBtn = document.createElement('button');
                wipeBtn.className = "bg-red-900/50 text-red-500 text-xs px-3 py-1 rounded cursor-pointer hover:bg-red-800/60 transition-colors";
                wipeBtn.textContent = "Wipe Link";
                wipeBtn.onclick = () => deleteItem(item._id);

                btnGroup.appendChild(editBtn);
                btnGroup.appendChild(wipeBtn);
                rowDiv.appendChild(textSpan);
                rowDiv.appendChild(btnGroup);
                list.appendChild(rowDiv);
            });
        }

        async function startEdit(id, type) {
            try {
                const res = await fetch(`${API_URL}/${id}?type=${type}`);
                if (!res.ok) throw new Error("Could not fetch link configurations mappings context");
                const item = await res.json();

                editingId = id;
                
                document.getElementById('tmdbId').value = id;
                document.getElementById('tmdbId').disabled = true; 
                document.getElementById('type').value = type;
                document.getElementById('type').disabled = true;

                toggleFormType();

                if (type === 'movie') {
                    document.getElementById('movie-links-container').innerHTML = "";
                    if (item.movieLinks && item.movieLinks.length > 0) {
                        item.movieLinks.forEach(link => addMovieLinkField(link.resolution, link.downloadUrl));
                    } else {
                        addMovieLinkField();
                    }
                } 
                else if (type === 'series' && item.seasons) {
                    document.getElementById('seasons-container').innerHTML = "";
                    item.seasons.forEach(season => {
                        const resContainer = addSeason(season.seasonNumber);
                        if (season.resolutions) {
                            season.resolutions.forEach(resBlock => {
                                const epContainer = addResolution(resContainer, resBlock.resolution, resBlock.batchLink);
                                if (resBlock.episodes) {
                                    resBlock.episodes.forEach(ep => addEpisode(epContainer, ep.episodeNumber, ep.downloadUrl));
                                }
                            });
                        }
                    });
                }

                document.getElementById('form-heading').textContent = `🔄 Editing Links Map Parameters (Target ID: ${id})`;
                document.getElementById('mode-badge').textContent = "⚠️ Form in Edit Mode";
                document.getElementById('mode-badge').className = "mt-1 inline-block bg-amber-950 text-amber-400 text-[10px] font-bold px-2 py-0.5 rounded border border-amber-900 uppercase tracking-widest";
                
                document.getElementById('submit-btn').textContent = "💾 SAVE CONFIGURATION CHANGES";
                document.getElementById('btn-cancel-edit').classList.remove('hidden');
                document.getElementById('form-heading').scrollIntoView({ behavior: 'smooth' });
                
                updateLivePreview();

            } catch (err) {
                alert("❌ Failed to pull link item information configuration map structure.");
            }
        }

        async function deleteItem(id) {
            if(confirm(`Wipe links mapping context profiles index for Database ID: ${id}?`)) {
                const res = await fetch(`${API_URL}/delete/${id}`, { 
                    method: 'DELETE',
                    headers: {
                        'X-Admin-Password': sessionPasswordMemory
                    }
                });
                if(res.ok) {
                    loadAdminList();
                    if(editingId === id) resetFormState();
                } else {
                    alert("Failed to delete item.");
                }
            }
        }

        function resetFormState() {
            editingId = null;
            document.getElementById('form-heading').textContent = "Upload Links via Internal Database Reference";
            
            document.getElementById('mode-badge').textContent = "Adding New Content";
            document.getElementById('mode-badge').className = "mt-1 inline-block bg-emerald-950 text-emerald-400 text-[10px] font-bold px-2 py-0.5 rounded border border-emerald-900 uppercase tracking-widest";
            
            document.getElementById('submit-btn').textContent = "🚀 PUBLISH DOWNLOAD MATRIX";
            document.getElementById('btn-cancel-edit').classList.add('hidden');
            document.getElementById('tmdbId').disabled = false;
            document.getElementById('type').disabled = false;
            form.reset();
            document.getElementById('movie-links-container').innerHTML = "";
            document.getElementById('seasons-container').innerHTML = "";
            document.getElementById('preview-title').value = "";
            document.getElementById('preview-image').value = "";
            document.getElementById('admin-search-bar').value = "";
            addMovieLinkField();
            toggleFormType();
            updateLivePreview();
            filterAdminList();
        }

        document.addEventListener('DOMContentLoaded', () => {
            addMovieLinkField();
        });
    </script>
</body>
</html>
