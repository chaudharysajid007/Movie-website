<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Media - MoviesMod</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; }
    </style>
</head>
<body>

    <header class="border-b border-gray-800 bg-[#111827] px-4 py-3 shadow-lg mb-6">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-xl font-black text-emerald-400 cursor-pointer" onclick="window.location.href='index.html'">⬅ BACK TO HOME</h1>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 pb-12">
        <div id="loading" class="flex justify-center my-12">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-emerald-400"></div>
        </div>

        <div id="content-container" class="hidden">
            <h2 id="media-title" class="text-2xl sm:text-3xl font-extrabold text-white mb-4"></h2>
            
            <div class="flex flex-col md:flex-row gap-6 mb-8">
                <img id="media-cover" class="w-full md:w-64 aspect-[2/3] object-cover rounded-lg shadow-xl border border-gray-800" src="" alt="">
                
                <div class="flex-1">
                    <h3 class="text-sm font-bold text-emerald-400 tracking-wider uppercase mb-1">Synopsis / Storyline</h3>
                    <p id="media-desc" class="text-gray-400 text-sm leading-relaxed mb-6"></p>
                    
                    <h3 class="text-sm font-bold text-emerald-400 tracking-wider uppercase mb-2">Screenshots</h3>
                    <div id="screenshots-box" class="grid grid-cols-2 gap-2"></div>
                </div>
            </div>

            <div class="bg-[#111827] border border-gray-800 rounded-xl p-4 sm:p-6 shadow-inner">
                <h3 class="text-lg font-bold text-white mb-4 border-b border-gray-800 pb-2 flex items-center gap-2">
                    📥 Download Links Generation
                </h3>
                <div id="download-zone"></div>
            </div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const contentId = urlParams.get('id');
        const itemType = urlParams.get('type') || 'movie'; 
        
        const API_BASE = "https://guarded-caverns-13017-b15ead89228a.herokuapp.com/api/content";
        const FETCH_URL = `${API_BASE}/${contentId}?type=${itemType}`;
        const REQUEST_URL = `${API_BASE}/request/${contentId}`;

        let globalMediaData = null; 

        async function loadPageDetails() {
            if(!contentId) return;
            try {
                const response = await fetch(FETCH_URL);
                const data = await response.json();
                globalMediaData = data; 
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content-container').classList.remove('hidden');

                document.getElementById('media-title').innerText = data.title;
                document.getElementById('media-desc').innerText = data.description || "No plot summary available currently.";
                document.getElementById('media-cover').src = data.coverImageUrl;

                const screenBox = document.getElementById('screenshots-box');
                screenBox.innerHTML = '';
                if (data.screenshots && data.screenshots.length > 0) {
                    data.screenshots.forEach(url => {
                        screenBox.innerHTML += `<img src="${url}" class="rounded border border-gray-800 hover:scale-102 transition-transform shadow w-full aspect-video object-cover">`;
                    });
                } else {
                    screenBox.innerHTML = `<p class="text-xs text-gray-500 italic col-span-2">No dynamic backdrop images provided.</p>`;
                }

                const downloadZone = document.getElementById('download-zone');
                
                if (!data.hasLinks) {
                    downloadZone.innerHTML = `
                        <div class="text-center py-6">
                            <p class="text-gray-400 text-sm mb-4">We don't have download links uploaded for this title yet.</p>
                            <button id="btn-request" onclick="sendTelegramRequest()" class="bg-emerald-500 hover:bg-emerald-600 text-black font-extrabold px-6 py-3 rounded-xl shadow transition-all transform active:scale-95 text-xs uppercase tracking-wider cursor-pointer">
                                📨 Request Download Link
                            </button>
                            <p id="request-status" class="text-xs text-emerald-400 mt-3 hidden font-medium"></p>
                        </div>`;
                    return;
                }

                if (data.type === 'movie') {
                    let movieHTML = `<div class="flex flex-col gap-4">`;
                    data.movieLinks.forEach((link, idx) => {
                        movieHTML += `
                            <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 bg-[#1f2937]/30 border border-gray-800/80 p-2 rounded-xl">
                                <a href="${link.downloadUrl}" target="_blank" class="flex-1 flex items-center justify-between bg-gradient-to-r from-emerald-600 to-teal-700 hover:from-emerald-500 hover:to-teal-600 text-white font-bold px-4 py-3 rounded-lg shadow transition-all duration-200">
                                    <span>Download Movie Direct Link</span>
                                    <span class="bg-black/30 px-3 py-1 rounded text-xs tracking-wider">${link.resolution}</span>
                                </a>
                                <button onclick="reportBrokenLink('${data.title.replace(/'/g, "\\'")}', '${contentId}', 'movie', '${link.resolution} Main Movie Link', this)" class="bg-red-950/40 text-red-400 border border-red-900/50 px-4 py-3 sm:py-3.5 rounded-lg text-xs font-bold hover:bg-red-900 hover:text-white transition-all cursor-pointer whitespace-nowrap">
                                    🚨 Report Broken
                                </button>
                            </div>`;
                    });
                    movieHTML += `</div>`;
                    downloadZone.innerHTML = movieHTML;

                } else {
                    let seriesHTML = `<div class="flex flex-col gap-4">`;
                    
                    data.seasons.forEach((season, sIdx) => {
                        seriesHTML += `
                            <div class="border border-gray-800 rounded-lg overflow-hidden bg-[#1f2937]/50">
                                <button onclick="toggleAccordion('season-${sIdx}')" class="w-full text-left bg-[#1f2937] hover:bg-gray-700 px-4 py-3 font-bold text-emerald-400 flex justify-between items-center transition-colors">
                                    <span>💥 Season ${season.seasonNumber} Breakdown</span>
                                    <span>🔻</span>
                                </button>
                                
                                <div id="season-${sIdx}" class="hidden p-4 flex flex-col gap-4 border-t border-gray-800 bg-[#0f172a]">`;
                        
                        season.resolutions.forEach((res, rIdx) => {
                            seriesHTML += `
                                <div class="border-l-2 border-emerald-500 pl-3">
                                    <div class="flex items-center justify-between mb-2">
                                        <h4 class="text-sm font-bold text-white uppercase tracking-wide bg-gray-800 inline-block px-2 py-0.5 rounded text-xs">${res.resolution} Quality</h4>
                                        ${res.batchLink ? `
                                            <button onclick="reportBrokenLink('${data.title.replace(/'/g, "\\'")}', '${contentId}', 'series', 'Season ${season.seasonNumber} - ${res.resolution} Batch Folder Link', this)" class="text-[10px] bg-red-950/40 text-red-400 border border-red-900/30 px-2 py-0.5 rounded hover:bg-red-900 hover:text-white transition-colors cursor-pointer">
                                                🚨 Report Batch Broken
                                            </button>
                                        ` : ''}
                                    </div>
                                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-2">`;
                                    
                            res.episodes.forEach(ep => {
                                seriesHTML += `
                                    <div class="flex flex-col gap-1 bg-[#111827] p-1.5 rounded border border-gray-800">
                                        <a href="${ep.downloadUrl}" target="_blank" class="bg-gray-800 hover:bg-emerald-600 hover:text-black border border-gray-700 text-xs px-2 py-1.5 rounded transition-all font-bold text-center">
                                            EP ${ep.episodeNumber}
                                        </a>
                                        <button onclick="reportBrokenLink('${data.title.replace(/'/g, "\\'")}', '${contentId}', 'series', 'Season ${season.seasonNumber} - ${res.resolution} - Episode ${ep.episodeNumber}', this)" class="text-[9px] text-red-400 hover:underline text-center cursor-pointer">
                                            Report Dead
                                        </button>
                                    </div>`;
                            });
                            
                            seriesHTML += `</div>`;
                            
                            if (res.batchLink) {
                                seriesHTML += `
                                    <a href="${res.batchLink}" target="_blank" class="inline-flex items-center text-xs text-amber-400 hover:underline font-semibold gap-1 mt-1">
                                        📦 Download Complete Season Batch (${res.resolution}) ⚡
                                    </a>`;
                            }
                            
                            seriesHTML += `</div><hr class="border-gray-900 my-1">`;
                        });
                        
                        seriesHTML += `</div></div>`;
                    });
                    
                    seriesHTML += `</div>`;
                    downloadZone.innerHTML = seriesHTML;
                }

            } catch (err) {
                console.error("Single item load failed:", err);
            }
        }

        function toggleAccordion(id) {
            const block = document.getElementById(id);
            block.classList.toggle('hidden');
        }

        async function sendTelegramRequest() {
            if (!globalMediaData) return;

            const btn = document.getElementById('btn-request');
            const statusTxt = document.getElementById('request-status');

            btn.disabled = true;
            btn.innerText = "⏳ Requesting...";

            try {
                const response = await fetch(REQUEST_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: globalMediaData.title,
                        type: globalMediaData.type
                    })
                });

                const result = await response.json();
                statusTxt.classList.remove('hidden');

                if (response.ok) {
                    btn.className = "bg-gray-800 text-gray-500 font-bold px-6 py-3 rounded-xl shadow cursor-not-allowed text-xs uppercase tracking-wider";
                    btn.innerText = "✅ Requested Successfully";
                    statusTxt.innerText = "Sajid has been instantly pinged via Telegram! Links will be up shortly.";
                    statusTxt.className = "text-xs text-emerald-400 mt-3 font-medium";
                } else {
                    throw new Error(result.message || "Request failed");
                }
            } catch (err) {
                console.error(err);
                btn.disabled = false;
                btn.innerText = "📨 Request Download Link";
                statusTxt.innerText = "Failed to dispatch request. Try again later.";
                statusTxt.className = "text-xs text-red-400 mt-3 font-medium";
            }
        }

        // 🚨 NEW MODULE: ASYNC BROKEN LINK SYSTEM NOTIFIER
        async function reportBrokenLink(title, tmdbId, type, details, element) {
            if (element.disabled) return;
            
            const originalText = element.innerText;
            element.disabled = true;
            element.innerText = "⏳ Reporting...";

            try {
                // Utilizing the live request route structure to carry payload diagnostics
                const response = await fetch(`${API_BASE}/request/${tmdbId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: `⚠️ BROKEN LINK REPORT: ${title}`,
                        type: `${type.toUpperCase()} [Asset details: ${details}]`
                    })
                });

                if (response.ok) {
                    element.innerText = "✅ Reported";
                    element.className = element.className.replace(/bg-red-950\/40|text-red-400|hover:bg-red-900/g, '') + " bg-gray-800 text-gray-500 border-gray-700 cursor-not-allowed";
                    alert(`✅ Thank you! The issue with "${details}" has been forwarded directly to Sajid's control center.`);
                } else {
                    throw new Error("Report failed");
                }
            } catch (err) {
                console.error(err);
                element.disabled = false;
                element.innerText = originalText;
                alert("❌ Could not connect to reporting stream. Please try again later.");
            }
        }

        window.onload = () => loadPageDetails();
    </script>
</body>
</html>
