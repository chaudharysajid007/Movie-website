<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Media - Sajidflix</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="alerts.js"></script>
    <script src="config.js"></script>
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; }
    </style>
</head>
<body>

    <header class="border-b border-gray-800 bg-[#111827] px-4 py-3 shadow-lg mb-6">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-xl font-black text-emerald-400 cursor-pointer" onclick="window.location.href='index.html'">⬅ BACK TO HOME</h1>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 pb-12">
        <div id="loading" class="flex justify-center my-12">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-emerald-400"></div>
        </div>

        <div id="content-container" class="hidden">
            <h2 id="media-title" class="text-2xl sm:text-3xl font-extrabold text-white mb-4"></h2>
            
            <div class="flex flex-col md:flex-row gap-6 mb-8">
                <img id="media-cover" class="w-full md:w-64 aspect-[2/3] object-cover rounded-lg shadow-xl border border-gray-800" src="" alt="">
                
                <div class="flex-1">
                    <h3 class="text-sm font-bold text-emerald-400 tracking-wider uppercase mb-1">Synopsis / Storyline</h3>
                    <p id="media-desc" class="text-gray-400 text-sm leading-relaxed mb-6"></p>
                    
                    <h3 class="text-sm font-bold text-emerald-400 tracking-wider uppercase mb-2">Screenshots</h3>
                    <div id="screenshots-box" class="grid grid-cols-2 gap-2"></div>
                </div>
            </div>

            <div class="bg-[#111827] border border-gray-800 rounded-xl p-4 sm:p-6 shadow-inner">
                <h3 class="text-lg font-bold text-white mb-4 border-b border-gray-800 pb-2 flex items-center gap-2">
                    📥 Download Links Generation
                </h3>
                <div id="download-zone"></div>
            </div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const contentId = urlParams.get('id');
        const itemType = urlParams.get('type') || 'movie'; 
        
        const API_BASE = "https://guarded-caverns-13017-b15ead89228a.herokuapp.com/api/content";
        const FETCH_URL = `${API_BASE}/${contentId}?type=${itemType}`;
        const REQUEST_URL = `${API_BASE}/request/${contentId}`;

        let globalMediaData = null; 

        async function loadPageDetails() {
            if(!contentId) return;
            try {
                const response = await fetch(FETCH_URL);
                const data = await response.json();
                globalMediaData = data; 
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content-container').classList.remove('hidden');

                document.getElementById('media-title').textContent = data.title;
                document.getElementById('media-desc').textContent = data.description || "No plot summary available currently.";
                document.getElementById('media-cover').src = data.coverImageUrl;
                document.getElementById('media-cover').alt = data.title;

                const screenBox = document.getElementById('screenshots-box');
                screenBox.innerHTML = '';
                if (data.screenshots && data.screenshots.length > 0) {
                    data.screenshots.forEach(url => {
                        const img = document.createElement('img');
                        img.src = url;
                        img.className = "rounded border border-gray-800 hover:scale-102 transition-transform shadow w-full aspect-video object-cover";
                        screenBox.appendChild(img);
                    });
                } else {
                    const fallback = document.createElement('p');
                    fallback.className = "text-xs text-gray-500 italic col-span-2";
                    fallback.textContent = "No dynamic backdrop images provided.";
                    screenBox.appendChild(fallback);
                }

                const downloadZone = document.getElementById('download-zone');
                downloadZone.innerHTML = '';
                
                if (!data.hasLinks) {
                    const noLinksDiv = document.createElement('div');
                    noLinksDiv.className = "text-center py-6";

                    const msg = document.createElement('p');
                    msg.className = "text-gray-400 text-sm mb-4";
                    msg.textContent = "We don't have download links uploaded for this title yet.";

                    const btn = document.createElement('button');
                    btn.id = "btn-request";
                    btn.className = "bg-emerald-500 hover:bg-emerald-600 text-black font-extrabold px-6 py-3 rounded-xl shadow transition-all transform active:scale-95 text-xs uppercase tracking-wider cursor-pointer";
                    btn.textContent = "📨 Request Download Link";
                    btn.onclick = sendTelegramRequest;

                    const status = document.createElement('p');
                    status.id = "request-status";
                    status.className = "text-xs text-emerald-400 mt-3 hidden font-medium";

                    noLinksDiv.appendChild(msg);
                    noLinksDiv.appendChild(btn);
                    noLinksDiv.appendChild(status);
                    downloadZone.appendChild(noLinksDiv);
                    return;
                }

                if (data.type === 'movie') {
                    const container = document.createElement('div');
                    container.className = "flex flex-col gap-4";

                    data.movieLinks.forEach((link) => {
                        const row = document.createElement('div');
                        row.className = "flex flex-col sm:flex-row items-stretch sm:items-center gap-2 bg-[#1f2937]/30 border border-gray-800/80 p-2 rounded-xl";

                        const downloadAnchor = document.createElement('a');
                        downloadAnchor.href = link.downloadUrl;
                        downloadAnchor.target = "_blank";
                        downloadAnchor.className = "flex-1 flex items-center justify-between bg-gradient-to-r from-emerald-600 to-teal-700 hover:from-emerald-500 hover:to-teal-600 text-white font-bold px-4 py-3 rounded-lg shadow transition-all duration-200";

                        const labelSpan = document.createElement('span');
                        labelSpan.textContent = "Download Movie Direct Link";

                        const resSpan = document.createElement('span');
                        resSpan.className = "bg-black/30 px-3 py-1 rounded text-xs tracking-wider";
                        resSpan.textContent = link.resolution;

                        downloadAnchor.appendChild(labelSpan);
                        downloadAnchor.appendChild(resSpan);

                        const reportBtn = document.createElement('button');
                        reportBtn.className = "bg-red-950/40 text-red-400 border border-red-900/50 px-4 py-3 sm:py-3.5 rounded-lg text-xs font-bold hover:bg-red-900 hover:text-white transition-all cursor-pointer whitespace-nowrap";
                        reportBtn.textContent = "🚨 Report Broken";
                        reportBtn.onclick = () => reportBrokenLink(data.title, contentId, 'movie', `${link.resolution} Main Movie Link`, reportBtn);

                        row.appendChild(downloadAnchor);
                        row.appendChild(reportBtn);
                        container.appendChild(row);
                    });

                    downloadZone.appendChild(container);

                } else {
                    const container = document.createElement('div');
                    container.className = "flex flex-col gap-4";
                    
                    data.seasons.forEach((season, sIdx) => {
                        const seasonWrapper = document.createElement('div');
                        seasonWrapper.className = "border border-gray-800 rounded-lg overflow-hidden bg-[#1f2937]/50 mb-2";

                        const accordionBtn = document.createElement('button');
                        accordionBtn.className = "w-full text-left bg-[#1f2937] hover:bg-gray-700 px-4 py-3 font-bold text-emerald-400 flex justify-between items-center transition-colors cursor-pointer";
                        accordionBtn.onclick = () => toggleAccordion(`season-${sIdx}`);

                        const btnTitle = document.createElement('span');
                        btnTitle.textContent = `💥 Season ${season.seasonNumber} Breakdown`;
                        const btnIcon = document.createElement('span');
                        btnIcon.textContent = "🔻";

                        accordionBtn.appendChild(btnTitle);
                        accordionBtn.appendChild(btnIcon);

                        const contentDiv = document.createElement('div');
                        contentDiv.id = `season-${sIdx}`;
                        contentDiv.className = "hidden p-4 flex flex-col gap-4 border-t border-gray-800 bg-[#0f172a]";

                        season.resolutions.forEach((res) => {
                            const resWrapper = document.createElement('div');
                            resWrapper.className = "border-l-2 border-emerald-500 pl-3 mb-2";

                            const topMetaRow = document.createElement('div');
                            topMetaRow.className = "flex items-center justify-between mb-2";

                            const qualityHeader = document.createElement('h4');
                            qualityHeader.className = "text-sm font-bold text-white uppercase tracking-wide bg-gray-800 inline-block px-2 py-0.5 rounded text-xs";
                            qualityHeader.textContent = `${res.resolution} Quality`;
                            topMetaRow.appendChild(qualityHeader);

                            if (res.batchLink) {
                                const reportBatchBtn = document.createElement('button');
                                reportBatchBtn.className = "text-[10px] bg-red-950/40 text-red-400 border border-red-900/30 px-2 py-0.5 rounded hover:bg-red-900 hover:text-white transition-colors cursor-pointer";
                                reportBatchBtn.textContent = "🚨 Report Batch Broken";
                                reportBatchBtn.onclick = () => reportBrokenLink(data.title, contentId, 'series', `Season ${season.seasonNumber} - ${res.resolution} Batch Folder Link`, reportBatchBtn);
                                topMetaRow.appendChild(reportBatchBtn);
                            }

                            const epGrid = document.createElement('div');
                            epGrid.className = "grid grid-cols-2 sm:grid-cols-4 gap-2 mb-2";

                            res.episodes.forEach(ep => {
                                const epCard = document.createElement('div');
                                epCard.className = "flex flex-col gap-1 bg-[#111827] p-1.5 rounded border border-gray-800";

                                const epLink = document.createElement('a');
                                epLink.href = ep.downloadUrl;
                                epLink.target = "_blank";
                                epLink.className = "bg-gray-800 hover:bg-emerald-600 hover:text-black border border-gray-700 text-xs px-2 py-1.5 rounded transition-all font-bold text-center text-white decoration-none";
                                epLink.textContent = `EP ${ep.episodeNumber}`;

                                const epReportBtn = document.createElement('button');
                                epReportBtn.className = "text-[9px] text-red-400 hover:underline text-center cursor-pointer";
                                epReportBtn.textContent = "Report Dead";
                                epReportBtn.onclick = () => reportBrokenLink(data.title, contentId, 'series', `Season ${season.seasonNumber} - ${res.resolution} - Episode ${ep.episodeNumber}`, epReportBtn);

                                epCard.appendChild(epLink);
                                epCard.appendChild(epReportBtn);
                                epGrid.appendChild(epCard);
                            });

                            resWrapper.appendChild(topMetaRow);
                            resWrapper.appendChild(epGrid);

                            if (res.batchLink) {
                                const batchLinkAnchor = document.createElement('a');
                                batchLinkAnchor.href = res.batchLink;
                                batchLinkAnchor.target = "_blank";
                                batchLinkAnchor.className = "inline-flex items-center text-xs text-amber-400 hover:underline font-semibold gap-1 mt-1 mb-2";
                                batchLinkAnchor.textContent = `📦 Download Complete Season Batch (${res.resolution}) ⚡`;
                                resWrapper.appendChild(batchLinkAnchor);
                            }

                            const hr = document.createElement('hr');
                            hr.className = "border-gray-900 my-1";

                            resWrapper.appendChild(hr);
                            contentDiv.appendChild(resWrapper);
                        });

                        seasonWrapper.appendChild(accordionBtn);
                        seasonWrapper.appendChild(contentDiv);
                        container.appendChild(seasonWrapper);
                    });

                    // ✨ Fixed: Removed the self-appending bug line completely here!
                    downloadZone.appendChild(container);
                }

            } catch (err) {
                console.error("Single item load failed:", err);
            }
        }

        function toggleAccordion(id) {
            const block = document.getElementById(id);
            block.classList.toggle('hidden');
        }

        async function sendTelegramRequest() {
            if (!globalMediaData) return;

            const btn = document.getElementById('btn-request');
            const statusTxt = document.getElementById('request-status');

            btn.disabled = true;
            btn.textContent = "⏳ Requesting...";

            try {
                const response = await fetch(REQUEST_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: globalMediaData.title,
                        type: globalMediaData.type
                    })
                });

                const result = await response.json();
                statusTxt.classList.remove('hidden');

                if (response.ok) {
                    btn.className = "bg-gray-800 text-gray-500 font-bold px-6 py-3 rounded-xl shadow cursor-not-allowed text-xs uppercase tracking-wider";
                    btn.textContent = "✅ Requested Successfully";
                    statusTxt.textContent = "Sajid has been instantly pinged via Telegram! Links will be up shortly.";
                    statusTxt.className = "text-xs text-emerald-400 mt-3 font-medium";
                } else {
                    throw new Error(result.message || "Request failed");
                }
            } catch (err) {
                console.error(err);
                btn.disabled = false;
                btn.textContent = "📨 Request Download Link";
                statusTxt.textContent = "Failed to dispatch request. Try again later.";
                statusTxt.className = "text-xs text-red-400 mt-3 font-medium";
            }
        }

        async function reportBrokenLink(title, tmdbId, type, details, element) {
            if (element.disabled) return;
            
            const originalText = element.textContent;
            element.disabled = true;
            element.textContent = "⏳ Reporting...";

            try {
                const response = await fetch(`${API_BASE}/request/${tmdbId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: `⚠️ BROKEN LINK REPORT: ${title}`,
                        type: `${type.toUpperCase()} [Asset details: ${details}]`
                    })
                });

                if (response.ok) {
                    element.textContent = "✅ Reported";
                    element.className = element.className.replace(/bg-red-950\/40|text-red-400|hover:bg-red-900/g, '') + " bg-gray-800 text-gray-500 border-gray-700 cursor-not-allowed";
                    alert(`✅ Thank you! The issue with "${details}" has been forwarded directly to Sajid's control center.`);
                } else {
                    throw new Error("Report failed");
                }
            } catch (err) {
                console.error(err);
                element.disabled = false;
                element.textContent = originalText;
                alert("❌ Could not connect to reporting stream. Please try again later.");
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadPageDetails();
        });
    </script>

    <div id="custom-alert-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4 transition-all">
        <div class="bg-[#111827] border border-gray-800 p-6 rounded-xl shadow-2xl max-w-sm w-full text-center transform scale-95 transition-all">
            <div id="custom-alert-icon" class="text-3xl mb-3">⚠️</div>
            <p id="custom-alert-message" class="text-sm text-gray-300 mb-6 font-medium leading-relaxed">Alert message goes here.</p>
            <button type="button" onclick="closeCustomAlert()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-bold py-2.5 rounded-lg cursor-pointer transition-colors shadow-lg">ACKNOWLEDGE</button>
        </div>
    </div>

</body>
</html>
